<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>AstroMatch</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a0a2a; color: white; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #ffd700; color: #0a0a2a; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ AstroMatch ✨</h1>
        <form id="astroForm">
            <input type="text" id="name" placeholder="Seu nome" required>
            <input type="date" id="birthDate" required>
            <input type="time" id="birthTime" value="12:00">
            <input type="text" id="birthCity" placeholder="Cidade" required>
            <button type="submit">Gerar Mapa Astral</button>
        </form>
        <div id="result"></div>
    </div>
    <script>
        const API_URL = 'https://astromatch-api.onrender.com';
        const form = document.getElementById('astroForm');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const birthDate = document.getElementById('birthDate').value;
            const birthTime = document.getElementById('birthTime').value;
            const birthCity = document.getElementById('birthCity').value;

            try {
                const response = await fetch(`${API_URL}/api/astro/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ birthDate, birthTime, birthCity })
                });
                const data = await response.json();
                if (data.success) {
                    resultDiv.innerHTML = `<h3>Mapa Astral de ${name}</h3><pre>${JSON.stringify(data.chart, null, 2)}</pre>`;
                }
            } catch (error) {
                resultDiv.innerHTML = '<p>Erro ao gerar mapa astral.</p>';
            }
        });
    </script>
</body>
</html>
